<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>🔮 深空工具站 — AI工具导航</title>
<meta name="description" content="44个精选AI工具和在线工具导航">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{font-size:15px;-webkit-tap-highlight-color:transparent;scroll-behavior:smooth}
@media(max-width:400px){html{font-size:14px}}

@keyframes twinkle{0%,100%{opacity:.3}50%{opacity:.8}}
@keyframes glow{0%,100%{box-shadow:0 0 15px rgba(129,140,248,.08)}50%{box-shadow:0 0 30px rgba(129,140,248,.2)}}
@keyframes drift{0%{transform:translateY(0)}50%{transform:translateY(-8px)}100%{transform:translateY(0)}}
@keyframes fadeSlide{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes rotate{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
@keyframes breathe{0%,100%{opacity:.4}50%{opacity:.8}}

body{
  background:#080a14;color:#d1d5db;
  font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',sans-serif;
  min-height:100vh;overflow-x:hidden;
  background-image:
    radial-gradient(ellipse 80% 50% at 30% 20%, rgba(99,102,241,.06) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 70% 80%, rgba(6,182,212,.04) 0%, transparent 50%),
    radial-gradient(ellipse 50% 50% at 10% 60%, rgba(168,85,247,.04) 0%, transparent 50%);
}
body::before{
  content:'';position:fixed;top:0;left:0;width:100%;height:100%;
  background-image:
    radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,.3), transparent),
    radial-gradient(1px 1px at 50% 15%, rgba(255,255,255,.2), transparent),
    radial-gradient(1.5px 1.5px at 80% 40%, rgba(255,255,255,.25), transparent),
    radial-gradient(1px 1px at 30% 70%, rgba(255,255,255,.15), transparent),
    radial-gradient(1.5px 1.5px at 70% 60%, rgba(255,255,255,.2), transparent),
    radial-gradient(1px 1px at 90% 90%, rgba(255,255,255,.15), transparent),
    radial-gradient(1px 1px at 10% 85%, rgba(255,255,255,.2), transparent),
    radial-gradient(1px 1px at 60% 35%, rgba(255,255,255,.1), transparent);
  pointer-events:none;z-index:-1;animation:twinkle 4s ease-in-out infinite;
}

/* Hero */
.hero{
  position:relative;text-align:center;padding:50px 16px 28px;overflow:hidden;
}
.hero::before{
  content:'';position:absolute;top:-100px;left:50%;transform:translateX(-50%);
  width:500px;height:500px;
  background:radial-gradient(circle,rgba(99,102,241,.08) 0%,transparent 60%);
  pointer-events:none;
}
.h-glow{
  position:absolute;top:10px;right:10px;width:120px;height:120px;
  background:radial-gradient(circle,rgba(6,182,212,.06),transparent 70%);
  pointer-events:none;
}
.h-icon{font-size:2.6rem;display:block;margin-bottom:4px;animation:drift 4s ease-in-out infinite;position:relative;z-index:1}
.h-title{
  font-size:1.6rem;font-weight:800;letter-spacing:-.02em;
  background:linear-gradient(135deg,#c7d2fe,#818cf8,#67e8f9);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  position:relative;z-index:1;
}
.h-desc{font-size:.72rem;color:#4b5563;margin-top:4px;position:relative;z-index:1}

/* Stats glass */
.stats{
  display:inline-flex;gap:16px;margin:14px auto;padding:8px 20px;
  border-radius:100px;position:relative;z-index:1;
  background:rgba(17,24,39,.5);border:1px solid rgba(255,255,255,.06);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
}
.stat{text-align:center}
.stat .n{font-size:.9rem;font-weight:700;color:#818cf8;display:block}
.stat .l{font-size:.48rem;color:#4b5563}

/* Search */
.srch{max-width:400px;margin:16px auto 0;position:relative;z-index:1}
.srch input{
  width:100%;padding:11px 16px;border-radius:14px;
  background:rgba(17,24,39,.6);border:1px solid rgba(255,255,255,.08);
  color:#d1d5db;font-size:.75rem;outline:none;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  transition:all .25s;
}
.srch input:focus{border-color:rgba(129,140,248,.35);box-shadow:0 0 0 4px rgba(129,140,248,.06);background:rgba(17,24,39,.7)}
.srch input::placeholder{color:#374151}

/* Pills glass */
.pills-w{
  position:sticky;top:0;z-index:50;
  padding:8px 10px 10px;
  background:rgba(8,10,20,.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(255,255,255,.04);
}
.pills{display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;}
.pills::-webkit-scrollbar{display:none}
.pill{
  flex:0 0 auto;padding:6px 14px;border-radius:100px;
  font-size:.62rem;font-weight:500;cursor:pointer;user-select:none;white-space:nowrap;
  background:rgba(17,24,39,.4);border:1px solid rgba(255,255,255,.05);
  color:#4b5563;transition:all .25s;animation:fadeSlide .4s ease backwards;
}
.pill:active{transform:scale(.93)}
.pill:hover{border-color:rgba(129,140,248,.15);color:#6b7280}
.pill.active{
  background:rgba(129,140,248,.12);border-color:rgba(129,140,248,.3);color:#a5b4fc;
  box-shadow:0 0 16px rgba(129,140,248,.06);
}
.pill .c{font-size:.46rem;color:#374151}
.pill.active .c{color:rgba(129,140,248,.5)}

/* Grid */
.gw{max-width:720px;margin:0 auto;padding:10px 10px 40px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px}
@media(max-width:420px){.grid{grid-template-columns:repeat(auto-fill,minmax(145px,1fr))}}
.ch{
  display:flex;align-items:center;gap:8px;padding:8px 4px;grid-column:1/-1;animation:fadeSlide .4s ease;
}
.ch .ci{font-size:.8rem}
.ch .cn{font-size:.68rem;font-weight:600;color:#6b7280}
.ch .cb{flex:1;height:1px;background:linear-gradient(90deg,rgba(255,255,255,.06),transparent)}

/* Card glass */
.card{
  position:relative;display:flex;flex-direction:column;padding:16px 12px 14px;
  background:rgba(17,24,39,.4);border-radius:16px;
  border:1px solid rgba(255,255,255,.06);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  text-decoration:none;color:#d1d5db;
  transition:all .35s cubic-bezier(.22,1,.36,1);
  animation:fadeSlide .5s ease backwards;
  overflow:hidden;
}
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(129,140,248,.12),transparent);
  opacity:0;transition:opacity .35s;
}
.card:hover{transform:translateY(-4px);background:rgba(17,24,39,.55);border-color:rgba(129,140,248,.15);box-shadow:0 12px 32px rgba(0,0,0,.3)}
.card:hover::before{opacity:1}
.card:active{transform:scale(.96)}
.ct{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.ci{
  width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;
  font-size:1rem;background:rgba(30,41,59,.5);border:1px solid rgba(255,255,255,.04);flex-shrink:0;
  transition:.3s;
}
.card:hover .ci{background:rgba(30,41,59,.7);border-color:rgba(129,140,248,.15)}
.cn{font-size:.65rem;font-weight:600;color:#e5e7eb;line-height:1.3}
.cd{font-size:.52rem;color:#4b5563;line-height:1.4;overflow:hidden}
.chot{
  display:inline-block;margin-top:3px;
  background:linear-gradient(135deg,rgba(239,68,68,.2),rgba(249,115,22,.2));
  color:#fb923c;font-size:.4rem;font-weight:700;padding:1px 7px;border-radius:4px;
  border:1px solid rgba(239,68,68,.15);
}
.ca{display:none}

/* Footer */
.ft{padding:16px;text-align:center;border-top:1px solid rgba(255,255,255,.04);margin:0 12px}
.ft .u{font-size:.48rem;color:#374151;margin-bottom:4px}
.ft .l{font-size:.48rem;color:#374151}
.ft .l a{color:#4b5563;cursor:pointer;transition:.2s}
.ft .l a:hover{color:#818cf8}

.empty{text-align:center;padding:40px;color:#374151;font-size:.7rem}
.toast{
  position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);
  padding:10px 22px;border-radius:12px;font-size:.62rem;z-index:999;
  background:rgba(17,24,39,.9);border:1px solid rgba(255,255,255,.08);
  color:#d1d5db;backdrop-filter:blur(16px);
  opacity:0;pointer-events:none;transition:.3s;
  box-shadow:0 8px 32px rgba(0,0,0,.4);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.fab{
  position:fixed;bottom:24px;right:20px;width:38px;height:38px;border-radius:50%;
  background:rgba(17,24,39,.6);border:1px solid rgba(255,255,255,.06);
  color:#4b5563;font-size:.9rem;backdrop-filter:blur(12px);
  display:none;align-items:center;justify-content:center;cursor:pointer;z-index:90;
  transition:.2s;box-shadow:0 4px 16px rgba(0,0,0,.3);
}
.fab:hover{border-color:rgba(129,140,248,.25);color:#818cf8;transform:translateY(-2px)}
</style>
</head>
<body>

<div class="hero">
  <div class="h-glow"></div>
  <span class="h-icon">🔮</span>
  <h1 class="h-title">深空工具站</h1>
  <p class="h-desc">44个精选工具，在深空中发现最佳工具</p>
  <div class="stats">
    <div class="stat"><span class="n" id="c1">0</span><span class="l">工具</span></div>
    <div class="stat"><span class="n" id="c2">0</span><span class="l">热门</span></div>
    <div class="stat"><span class="n" id="c3">0</span><span class="l">分类</span></div>
  </div>
  <div class="srch"><input id="q" placeholder="搜索工具…" oninput="f(this.value)"></div>
</div>

<div class="pills-w"><div class="pills" id="pills"></div></div>
<div class="gw"><div class="grid" id="grid"></div><div class="empty" id="empty" style="display:none">🌌 没有找到匹配的工具</div></div>

<div class="ft">
  <div class="u" id="upd">⏳ 加载中…</div>
  <div class="l"><a onclick="sug()">推荐收录</a> · <a onclick="window.scrollTo({top:0,behavior:'smooth'})">回到顶部</a></div>
</div>

<div class="toast" id="toast"></div>
<div class="fab" id="topBtn" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</div>

<script>
let d=null,cur='all';
async function load(){
  const g=document.getElementById('grid');
  g.innerHTML='<div class="empty" style="display:block">⏳ 加载中…</div>';
  try{
    const r=await fetch('tools.json?_='+Date.now());
    d=await r.json();
    const t=d.categories.reduce((s,c)=>s+(c.tools?c.tools.length:0),0);
    const h=d.categories.reduce((s,c)=>s+(c.tools?c.tools.filter(x=>x.hot).length:0),0);
    document.getElementById('c1').textContent=t;
    document.getElementById('c2').textContent=h;
    document.getElementById('c3').textContent=d.categories.length;
    document.getElementById('upd').textContent='📅 '+d.updated+' · '+t+' 个工具';
    pills();render();
  }catch(e){g.innerHTML='<div class="empty" style="display:block">✦ 加载失败，刷新试试</div>'}
}
function pills(){
  const t=d.categories.reduce((s,c)=>s+(c.tools?c.tools.length:0),0);
  document.getElementById('pills').innerHTML=`<div class="pill active" data-p="all" onclick="setP('all')">全部 <span class="c">${t}</span></div>`+
    d.categories.map(c=>`<div class="pill" data-p="${c.id}" onclick="setP('${c.id}')">${c.icon||'#'} ${c.name} <span class="c">${c.tools.length}</span></div>`).join('');
}
function setP(id){cur=id;document.querySelectorAll('.pill').forEach(p=>p.classList.toggle('active',p.dataset.p===id));f(document.getElementById('q').value)}
function f(v){render(v)}
function sug(){const t=document.getElementById('toast');t.textContent='💫 留言推荐好工具，收录更新';t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2000)}
function render(v,p){
  if(p===undefined)p=cur;
  const q=(v||'').toLowerCase().trim();
  const g=document.getElementById('grid');
  let h='',a=false;
  for(const c of d.categories){
    const t=(c.tools||[]).filter(x=>{if(q&&!x.name.toLowerCase().includes(q)&&!x.desc.toLowerCase().includes(q))return false;if(p!=='all'&&c.id!==p)return false;return true});
    if(!t.length)continue;
    a=true;
    h+=`<div class="ch"><span class="ci">${c.icon||'#'}</span><span class="cn">${c.name}</span><span class="cb"></span></div>`+
      t.map((x,i)=>`<a class="card" style="animation-delay:${i*0.03}s" href="${x.url}" target="_blank" rel="noopener">
        <div class="ct"><div class="ci">${x.icon||'🔧'}</div><div class="cn">${x.name}</div></div>
        <div class="cd">${x.desc||''}</div>${x.hot?'<div class="chot">✦ 热门</div>':''}
      </a>`).join('');
  }
  g.innerHTML=h;
  document.getElementById('empty').style.display=a?'none':'block';
  if(!a)g.innerHTML='';
}
window.addEventListener('scroll',()=>{document.getElementById('topBtn').style.display=window.scrollY>400?'flex':'none'});
load();
</script>
</body>
</html>
