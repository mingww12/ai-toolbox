<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>🌈 工具游乐园 — AI工具导航</title>
<meta name="description" content="44个精选AI工具和在线工具导航">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{font-size:15px;-webkit-tap-highlight-color:transparent;scroll-behavior:smooth}
@media(max-width:400px){html{font-size:14px}}

@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes wobble{0%,100%{transform:rotate(0)}25%{transform:rotate(-3deg)}75%{transform:rotate(3deg)}}
@keyframes pop{0%{transform:scale(0);opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
@keyframes shift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes rise{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes wiggle{0%,100%{transform:rotate(0)}20%{transform:rotate(3deg)}40%{transform:rotate(-3deg)}60%{transform:rotate(2deg)}80%{transform:rotate(-2deg)}}

body{
  background:linear-gradient(135deg,#fef9f0 0%,#fff5f5 25%,#f0f4ff 50%,#f0fff4 75%,#fef9f0 100%);
  background-size:400% 400%;animation:shift 15s ease infinite;
  color:#2d2d2d;font-family:'PingFang SC','Hiragino Sans','Helvetica Neue',sans-serif;
  min-height:100vh;
}

/* Hero */
.hero{
  text-align:center;padding:44px 16px 24px;
  position:relative;overflow:hidden;
}
.hero::before{
  content:'';position:absolute;top:-40px;left:-40px;width:200px;height:200px;
  background:radial-gradient(circle,#ff6b6b20,transparent 70%);border-radius:50%;
}
.hero::after{
  content:'';position:absolute;bottom:-60px;right:-30px;width:180px;height:180px;
  background:radial-gradient(circle,#4ecdc420,transparent 70%);border-radius:50%;
}
.h-icon{font-size:2.8rem;display:block;animation:bounce 2s ease-in-out infinite;position:relative;z-index:1}
.h-title{
  font-size:1.7rem;font-weight:800;
  background:linear-gradient(135deg,#ff6b6b,#ffa94d,#4ecdc4,#45b7d1);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  background-size:300% 100%;animation:shift 4s ease infinite;
}
.h-desc{font-size:.72rem;color:#868686;margin-top:4px;position:relative;z-index:1}

/* Stats pills */
.stats{display:flex;justify-content:center;gap:8px;margin:14px auto;position:relative;z-index:1}
.stat{
  padding:5px 14px;border-radius:100px;font-size:.6rem;font-weight:600;
  animation:pop .4s cubic-bezier(.34,1.56,.64,1) backwards;
}
.stat:nth-child(1){background:#ff6b6b20;color:#ff6b6b;animation-delay:.1s}
.stat:nth-child(2){background:#ffa94d20;color:#e67a00;animation-delay:.2s}
.stat:nth-child(3){background:#4ecdc420;color:#00a896;animation-delay:.3s}
.stat .n{font-size:.75rem;margin-right:2px}

/* Search */
.srch{max-width:400px;margin:14px auto 0;position:relative;z-index:1}
.srch input{
  width:100%;padding:11px 16px;border-radius:100px;
  border:2px solid #e0e0e0;background:#fff;color:#2d2d2d;
  font-size:.78rem;outline:none;transition:.25s;
  box-shadow:0 2px 8px rgba(0,0,0,.04);
}
.srch input:focus{border-color:#ff6b6b;box-shadow:0 4px 16px rgba(255,107,107,.15)}
.srch input::placeholder{color:#aaa}

/* Pills */
.pills-w{
  position:sticky;top:0;z-index:50;
  padding:8px 10px 10px;
  background:rgba(255,255,255,.7);backdrop-filter:blur(12px);
}
.pills{display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;}
.pills::-webkit-scrollbar{display:none}
.pill{
  flex:0 0 auto;padding:6px 14px;border-radius:100px;
  font-size:.64rem;font-weight:600;cursor:pointer;user-select:none;white-space:nowrap;
  transition:all .2s cubic-bezier(.34,1.56,.64,1);animation:pop .3s cubic-bezier(.34,1.56,.64,1) backwards;
}
.pill:nth-child(1){background:#f0f0f0;color:#666}
.pill:nth-child(2){background:#ff6b6b15;color:#ff6b6b;animation-delay:.03s}
.pill:nth-child(3){background:#ffa94d15;color:#e67a00;animation-delay:.06s}
.pill:nth-child(4){background:#4ecdc415;color:#00a896;animation-delay:.09s}
.pill:nth-child(5){background:#45b7d115;color:#2d8ba8;animation-delay:.12s}
.pill:nth-child(6){background:#a29bfe15;color:#6c5ce7;animation-delay:.15s}
.pill:nth-child(7){background:#fd79a815;color:#d63031;animation-delay:.18s}
.pill:nth-child(8){background:#00b89415;color:#00856a;animation-delay:.21s}
.pill:nth-child(9){background:#fab1a015;color:#e17055;animation-delay:.24s}
.pill:active{transform:scale(.88)}
.pill.active{background:#2d2d2d;color:#fff;transform:scale(1.04)}
.pill .c{font-size:.48rem;opacity:.6}

/* Grid */
.gw{max-width:720px;margin:0 auto;padding:10px 10px 40px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px}
@media(max-width:420px){.grid{grid-template-columns:repeat(auto-fill,minmax(145px,1fr))}}
.ch{
  display:flex;align-items:center;gap:8px;padding:8px 4px;grid-column:1/-1;animation:rise .4s ease;
}
.ch .ci{font-size:.85rem;animation:wiggle .6s ease}
.ch .cn{font-size:.7rem;font-weight:700;color:#666}
.ch .cb{flex:1;height:2px;border-radius:2px;background:linear-gradient(90deg,#e0e0e0,transparent)}

/* Card */
.card{
  display:flex;flex-direction:column;padding:16px 12px 14px;
  background:#fff;border-radius:18px;
  text-decoration:none;color:#2d2d2d;
  box-shadow:0 2px 12px rgba(0,0,0,.04),0 1px 2px rgba(0,0,0,.02);
  transition:all .3s cubic-bezier(.34,1.56,.64,1);
  border:1px solid rgba(0,0,0,.04);
  animation:rise .5s ease backwards;
}
.card:hover{transform:translateY(-6px) scale(1.02);box-shadow:0 12px 32px rgba(0,0,0,.08);border-color:transparent}
.card:active{transform:scale(.95)}
.ct{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.ci{
  width:36px;height:36px;border-radius:12px;display:flex;align-items:center;justify-content:center;
  font-size:1.1rem;background:#f8f8fa;flex-shrink:0;transition:.3s;
}
.card:hover .ci{transform:scale(1.1) rotate(-5deg)}
.cn{font-size:.68rem;font-weight:700;line-height:1.3}
.cd{font-size:.55rem;color:#888;line-height:1.4;overflow:hidden}
.chot{
  display:inline-block;margin-top:4px;
  background:linear-gradient(135deg,#ff6b6b,#ffa94d);
  color:#fff;font-size:.42rem;font-weight:700;padding:1px 7px;border-radius:4px;
  animation:wiggle 1s ease infinite;
}
.ca{display:none}

/* Footer */
.ft{padding:16px;text-align:center;border-top:1px solid #e0e0e0;margin:0 12px}
.ft .u{font-size:.5rem;color:#aaa;margin-bottom:4px}
.ft .l{font-size:.5rem;color:#aaa}
.ft .l a{color:#666;cursor:pointer;font-weight:600}
.ft .l a:hover{color:#ff6b6b}

.empty{text-align:center;padding:40px;color:#aaa;font-size:.72rem}
.toast{
  position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);
  padding:12px 24px;border-radius:100px;font-size:.65rem;z-index:999;
  background:#2d2d2d;color:#fff;font-weight:500;
  opacity:0;pointer-events:none;transition:.3s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 8px 24px rgba(0,0,0,.12);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.fab{
  position:fixed;bottom:24px;right:20px;width:40px;height:40px;border-radius:50%;
  background:#fff;border:none;color:#666;font-size:1rem;
  display:none;align-items:center;justify-content:center;cursor:pointer;z-index:90;
  box-shadow:0 4px 16px rgba(0,0,0,.08);
  transition:.2s;
}
.fab:hover{transform:scale(1.1);box-shadow:0 6px 20px rgba(0,0,0,.12)}
</style>
</head>
<body>

<div class="hero">
  <span class="h-icon">🌈</span>
  <h1 class="h-title">工具游乐园</h1>
  <p class="h-desc">44个精选工具，好玩又实用</p>
  <div class="stats">
    <div class="stat"><span class="n" id="c1">0</span> 工具</div>
    <div class="stat"><span class="n" id="c2">0</span> 热门</div>
    <div class="stat"><span class="n" id="c3">0</span> 分类</div>
  </div>
  <div class="srch"><input id="q" placeholder="搜一搜…" oninput="f(this.value)"></div>
</div>

<div class="pills-w"><div class="pills" id="pills"></div></div>
<div class="gw"><div class="grid" id="grid"></div><div class="empty" id="empty" style="display:none">🫣 没找到，换个词试试？</div></div>

<div class="ft">
  <div class="u" id="upd">⏳ 加载中…</div>
  <div class="l"><a onclick="sug()">推荐工具</a> · <a onclick="window.scrollTo({top:0,behavior:'smooth'})">↑ 顶部</a></div>
</div>

<div class="toast" id="toast"></div>
<div class="fab" id="topBtn" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</div>

<script>
let d=null,cur='all';
async function load(){
  const g=document.getElementById('grid');
  g.innerHTML='<div class="empty" style="display:block">⏳ 加载中…</div>';
  try{
    const r=await fetch('tools.json?_='+Date.now());
    d=await r.json();
    const t=d.categories.reduce((s,c)=>s+(c.tools?c.tools.length:0),0);
    const h=d.categories.reduce((s,c)=>s+(c.tools?c.tools.filter(x=>x.hot).length:0),0);
    document.getElementById('c1').textContent=t;
    document.getElementById('c2').textContent=h;
    document.getElementById('c3').textContent=d.categories.length;
    document.getElementById('upd').textContent='📅 '+d.updated+' · '+t+' 个好工具';
    pills();render();
  }catch(e){g.innerHTML='<div class="empty" style="display:block">❌ 加载失败了，刷新一下</div>'}
}
function pills(){
  const t=d.categories.reduce((s,c)=>s+(c.tools?c.tools.length:0),0);
  document.getElementById('pills').innerHTML=`<div class="pill active" data-p="all" onclick="setP('all')">🌟 全部 <span class="c">${t}</span></div>`+
    d.categories.map(c=>`<div class="pill" data-p="${c.id}" onclick="setP('${c.id}')">${c.icon||'#'} ${c.name} <span class="c">${c.tools.length}</span></div>`).join('');
}
function setP(id){cur=id;document.querySelectorAll('.pill').forEach(p=>p.classList.toggle('active',p.dataset.p===id));f(document.getElementById('q').value)}
function f(v){render(v)}
function sug(){const t=document.getElementById('toast');t.textContent='💡 留言推荐好工具，我来收录';t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2000)}
function render(v,p){
  if(p===undefined)p=cur;
  const q=(v||'').toLowerCase().trim();
  const g=document.getElementById('grid');
  let h='',a=false;
  for(const c of d.categories){
    const t=(c.tools||[]).filter(x=>{if(q&&!x.name.toLowerCase().includes(q)&&!x.desc.toLowerCase().includes(q))return false;if(p!=='all'&&c.id!==p)return false;return true});
    if(!t.length)continue;
    a=true;
    h+=`<div class="ch"><span class="ci">${c.icon||'#'}</span><span class="cn">${c.name}</span><span class="cb"></span></div>`+
      t.map((x,i)=>`<a class="card" style="animation-delay:${i*0.04}s" href="${x.url}" target="_blank" rel="noopener">
        <div class="ct"><div class="ci">${x.icon||'🔧'}</div><div class="cn">${x.name}</div></div>
        <div class="cd">${x.desc||''}</div>${x.hot?'<div class="chot">🔥 超火</div>':''}
      </a>`).join('');
  }
  g.innerHTML=h;
  document.getElementById('empty').style.display=a?'none':'block';
  if(!a)g.innerHTML='';
}
window.addEventListener('scroll',()=>{document.getElementById('topBtn').style.display=window.scrollY>400?'flex':'none'});
load();
</script>
</body>
</html>
