<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{font-size:15px;-webkit-tap-highlight-color:transparent;scroll-behavior:smooth}

@keyframes twinkle{0%,100%{opacity:.3}50%{opacity:.8}}
@keyframes drift{0%{transform:translateY(0)}50%{transform:translateY(-6px)}100%{transform:translateY(0)}}
@keyframes fadeSlide{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

body::before{
  content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:-1;

    radial-gradient(1px 1px at 10% 85%,rgba(255,255,255,.2),transparent);
  animation:twinkle 4s ease-in-out infinite;
}
::selection{background:#818cf855;color:#fff}
a{color:#818cf8;text-decoration:none}

/* ══════ HERO ══════ */
.hero{position:relative;text-align:center;padding:28px 16px 10px;overflow:hidden}
.hero::before{
  content:'';position:absolute;top:-80px;left:50%;transform:translateX(-50%);
  width:500px;height:500px;
  background:radial-gradient(circle,rgba(99,102,241,.08) 0%,transparent 60%);
  pointer-events:none;
}
.h-icon{font-size:2.2rem;display:block;animation:drift 4s ease-in-out infinite}
.h-title{font-size:1.3rem;font-weight:800;background:linear-gradient(135deg,#c7d2fe,#818cf8,#67e8f9);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.h-desc{font-size:.58rem;color:#4b5563;margin-top:2px}

/* ══════ PPT TOOL (30% AREA) ══════ */
.ppt-wrap{max-width:580px;margin:6px auto 10px;padding:0 10px}
.ppt-card{
  background:rgba(17,24,39,.4);border:1px solid rgba(255,255,255,.06);border-radius:18px;
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);padding:14px;
  position:relative;overflow:hidden;
}
.ppt-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(129,140,248,.2),transparent);
}
.pt{display:flex;align-items:center;gap:6px;margin-bottom:10px}
.pt .pi{font-size:1rem}
.pt .pn{font-size:.68rem;font-weight:700;color:#a5b4fc}
.pt .ps{font-size:.5rem;color:#4b5563;margin-left:auto}
.pr{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.pr .hl{grid-column:1/-1}
.pr label{font-size:.52rem;color:#4b5563;font-weight:500;margin-bottom:2px;display:block}
.pr input,.pr select{
  width:100%;padding:7px 10px;border-radius:8px;
  background:rgba(13,17,23,.6);border:1px solid rgba(255,255,255,.06);
  color:#d1d5db;font-size:.6rem;outline:none;transition:.2s;
}
.pr input:focus,.pr select:focus{border-color:rgba(129,140,248,.2)}
.pr input::placeholder{color:#374151}
.pr select option{background:#111827;color:#d1d5db}
.ppt-go{
  grid-column:1/-1;padding:10px;border-radius:10px;border:none;margin-top:6px;
  background:linear-gradient(135deg,rgba(129,140,248,.2),rgba(99,102,241,.1));
  border:1px solid rgba(129,140,248,.25);color:#a5b4fc;font-size:.65rem;font-weight:600;
  cursor:pointer;transition:.25s;
}
.ppt-go:active{transform:scale(.97)}
.ppt-go:hover{background:linear-gradient(135deg,rgba(129,140,248,.3),rgba(99,102,241,.15))}
.ppt-go:disabled{opacity:.4;cursor:not-allowed}
.ppt-go .sp{display:none}
.ppt-go.loading .sp{display:inline-block;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ppt-msg{font-size:.5rem;margin-top:6px;display:none}
.ppt-msg.err{color:#f87171}
.ppt-msg.ok{color:#34d399}
.ppt-out{display:none;flex-direction:column;gap:6px;margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,.04)}
.ppt-out.show{display:flex}
.ppt-preview{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding:4px 0}
.ppt-preview::-webkit-scrollbar{display:none}
.ppt-slide{
  flex:0 0 100px;height:60px;border-radius:8px;
  background:rgba(13,17,23,.6);border:1px solid rgba(255,255,255,.06);
  display:flex;align-items:center;justify-content:center;
  font-size:.5rem;color:#9ca3af;padding:6px;text-align:center;overflow:hidden;font-weight:500;
  transition:.2s;cursor:default;
}
.ppt-slide:hover{border-color:rgba(129,140,248,.2);background:rgba(13,17,23,.8)}
.ppt-slide .sn{font-size:.32rem;color:#4b5563;display:block;margin-bottom:2px;font-weight:400}
.ppt-dl{
  display:flex;gap:6px;
}
.ppt-dl button{
  flex:1;padding:8px;border-radius:8px;border:none;font-size:.58rem;font-weight:600;
  cursor:pointer;transition:.2s;
}
.ppt-dl .dl-btn{background:rgba(129,140,248,.15);color:#a5b4fc}
.ppt-dl .dl-btn:hover{background:rgba(129,140,248,.25)}
.ppt-dl .cp-btn{background:rgba(34,197,94,.1);color:#4ade80}
.ppt-dl .cp-btn:hover{background:rgba(34,197,94,.2)}
.ppt-key-row{display:flex;gap:6px;grid-column:1/-1}
.ppt-key-row input{flex:1}
.ppt-key-row button{
  padding:7px 12px;border-radius:8px;border:none;
  background:rgba(129,140,248,.1);color:#a5b4fc;font-size:.52rem;cursor:pointer;
  white-space:nowrap;transition:.2s;
}
.ppt-key-row button:hover{background:rgba(129,140,248,.2)}
.ppt-key-guide{text-align:center;margin-top:4px}
.ppt-key-guide a{font-size:.48rem;color:#374151}
.ppt-key-guide a:hover{color:#6b7280}
.pr .skip-t{grid-column:1/-1;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.pr .skip-t label{display:inline}
.pr .skip-t input[type=checkbox]{width:auto;accent-color:#818cf8;margin:0}
.pr .skip-t input[type=number]{width:60px;display:none}
.pr .skip-t input[type=number].show{display:inline-block}
.ppt-notes{font-size:.48rem;color:#374151;margin-top:2px;grid-column:1/-1}

/* ══════ STATS ══════ */
.stats{

.stat{text-align:center}
.stat .n{font-size:.8rem;font-weight:700;color:#818cf8;display:block}

/* ══════ SEARCH ══════ */

.srch input:focus{border-color:rgba(129,140,248,.35);box-shadow:0 0 0 4px rgba(129,140,248,.06)}

/* ══════ PILLS ══════ */
.pills-w{
  position:sticky;top:0;z-index:50;
  padding:6px 10px 8px;
  background:rgba(8,10,20,.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);

.pills{display:flex;gap:4px;overflow-x:auto;scrollbar-width:none}
.pills::-webkit-scrollbar{display:none}
.pill{

.gw{max-width:720px;margin:0 auto;padding:8px 10px 40px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:7px}

.ch{display:flex;align-items:center;gap:6px;padding:6px 4px;grid-column:1/-1;animation:fadeSlide .4s ease}
.ch .ci{font-size:.7rem}
.ch .cn{font-size:.62rem;font-weight:600;color:#6b7280}

.card{
  display:flex;flex-direction:column;padding:14px 10px 12px;

.card:hover{transform:translateY(-3px);background:rgba(17,24,39,.55);border-color:rgba(129,140,248,.15);box-shadow:0 10px 28px rgba(0,0,0,.3)}
.card:active{transform:scale(.96)}
.ct{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.ci{

.chott{

  border:1px solid rgba(239,68,68,.15);
}

/* ══════ FOOTER ══════ */
.ft{padding:14px;text-align:center;border-top:1px solid rgba(255,255,255,.04);margin:0 12px}
.ft .u{font-size:.46rem;color:#374151;margin-bottom:3px}

.ft .l span:hover{color:#818cf8}
.empty{text-align:center;padding:40px;color:#374151;font-size:.6rem}
.toast{
  position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);

.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.fab{
  position:fixed;bottom:22px;right:18px;width:34px;height:34px;border-radius:50%;

  transition:.2s;box-shadow:0 4px 16px rgba(0,0,0,.3);

.fab:hover{border-color:rgba(129,140,248,.25);color:#818cf8}
</style>

  course: {
    name: '教学课件',
    sys: '你是一位资深教师和教学设计专家。制作课堂用的PPT课件。\n要求：\n- 知识结构清晰，循序渐进\n- 每页讲清楚一个知识点\n- 包含：导入、知识点讲解、案例分析、课堂练习、小结\n- 最后加思考题页\n- 输出格式：以"---"分隔每页，每页第一行是标题，后面是4-6个要点\n- 要点简洁易懂，适合课堂展示',
    style: {fontName:'Microsoft Yahei',fontSize:18,color:'064e3b'}
  },
  product: {
    name: '产品发布会',
    sys: '你是一位顶级营销策划师和发布会文案专家。制作产品发布/推广用的PPT。\n要求：\n- 每页要有冲击力，善用对比和数字\n- 包括：用户痛点、产品亮点、竞品对比、核心数据、客户见证、购买引导\n- 最后加行动号召页\n- 输出格式：以"---"分隔每页，每页第一行是标题，后面是3-5个要点\n- 每个要点控制在12字以内，短促有力',
    style: {fontName:'Microsoft Yahei',fontSize:18,color:'7f1d1d'}
  }
};

const PPT_COLORS = {
  defense: ['1e3a5f','2d6da8','b3d4f7','f0f4f8'],
  business: ['1a365d','2c5282','e2e8f0','ffffff'],
  report: ['1e293b','334155','cbd5e1','f8fafc'],
  course: ['064e3b','059669','a7f3d0','ecfdf5'],
  product: ['7f1d1d','dc2626','fecaca','fff5f5']
};

let pptData = null;

function savePPTKey(){
  const k = document.getElementById('pptKey').value.trim();
  if(!k.startsWith('sk-')&&k.length>0){toast('Key格式不对，应以sk-开头');return}
  if(k) localStorage.setItem('deepseek_key',k);
  document.getElementById('pptKey').value='';
  toast(k?'✅ Key已保存':'⚠️ Key为空');
}

async function genPPT(){
  const topic = document.getElementById('pptTopic').value.trim();
  if(!topic){toast('请先输入PPT主题');document.getElementById('pptTopic').focus();return}
  const type = document.getElementById('pptType').value;
  const slides = parseInt(document.getElementById('pptSlides').value);
  const skip = document.getElementById('pptSkip').checked ? parseInt(document.getElementById('pptSkipNum').value)||3 : 0;
  let key = document.getElementById('pptKey').value.trim() || localStorage.getItem('deepseek_key') || '';
  if(!key){toast('请先设置DeepSeek API Key');document.getElementById('pptKey').focus();return}

  const btn = document.getElementById('pptGo');
  const msg = document.getElementById('pptMsg');
  btn.classList.add('loading');btn.disabled=true;
  msg.className='ppt-msg';msg.style.display='none';
  document.getElementById('pptOut').classList.remove('show');

  const info = PPT_PROMPTS[type];
  const totalSlides = slides + skip;
  const promptText = `主题："${topic}"\n类型：${info.name}\n总共${totalSlides}页PPT，前${skip}页为已有PPT请用"SKIP"标记，从第${skip+1}页开始生成${slides}页新内容。\n\n请生成${slides}页关于「${topic}」的PPT内容。`;

  try{
    const res = await fetch('https://api.deepseek.com/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
      body:JSON.stringify({
        model:'deepseek-chat',
        messages:[{role:'system',content:info.sys},{role:'user',content:promptText}],
        max_tokens:8192,temperature:0.7
      })
    });
    if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.error?.message||'API请求失败('+res.status+')')}
    const data = await res.json();
    const text = data.choices?.[0]?.message?.content?.trim()||'';
    if(!text){msg.textContent='❌ AI返回为空，请重试';msg.className='ppt-msg err';msg.style.display='block';return}

    // Parse slides
    const parts = text.split('---').filter(p=>p.trim());
    pptData = {topic,type,totalSlides:parts.length,slides:[]};
    for(let p of parts){
      const lines = p.trim().split('\n').filter(l=>l.trim());
      if(lines.length===0)continue;
      if(lines[0].trim().toUpperCase()==='SKIP'||lines[0].includes('SKIP'))continue;
      const title = lines[0].replace(/^#+\s*/,'').replace(/^\d+[\.\、\s]+/,'').trim();
      const bullets = lines.slice(1).map(l=>l.replace(/^[-*•·\d+\.\s]+/,'').trim()).filter(l=>l&&l.length>2);
      pptData.slides.push({title,bullets});
    }
    renderPreview();
    msg.textContent=`✅ 生成成功！共${pptData.slides.length}页PPT`;
    msg.className='ppt-msg ok';msg.style.display='block';
    document.getElementById('pptOut').classList.add('show');
  }catch(e){
    msg.textContent='❌ '+e.message;msg.className='ppt-msg err';msg.style.display='block';
  }finally{
    btn.classList.remove('loading');btn.disabled=false;
  }
}

function renderPreview(){
  const c = document.getElementById('pptPreview');
  c.innerHTML = pptData.slides.map((s,i)=>`<div class="ppt-slide"><span class="sn">${i+1}/${pptData.slides.length}</span>${s.title.slice(0,10)}${s.title.length>10?'…':''}</div>`).join('');
}

function downloadPPT(){
  if(!pptData||!pptData.slides.length){toast('请先生成PPT');return}
  try{
    const ppt = new PptxGenJS();
    ppt.defineLayout({name:'WIDE',width:10,height:5.625});
    ppt.layout='WIDE';
    const colors = PPT_COLORS[pptData.type]||['1e293b','334155','cbd5e1','f8fafc'];

    // Title slide
    const s1 = ppt.addSlide();
    s1.background={color:colors[0]};
    s1.addText(pptData.topic,{x:0.5,y:1.5,w:9,h:1.2,fontSize:28,fontFace:'Microsoft Yahei',color:colors[3],bold:true,align:'center'});
    s1.addText('AI自动生成 | 类型：'+(PPT_PROMPTS[pptData.type]?.name||'通用'),{x:0.5,y:3,w:9,h:0.5,fontSize:12,color:colors[2],align:'center'});

    // Content slides
    for(let i=0;i<pptData.slides.length;i++){
      const s = pptData.slides[i];
      const sl = ppt.addSlide();
      sl.background={color:'ffffff'};
      // Title bar
      sl.addShape(ppt.ShapeType.rect,{x:0,y:0,w:10,h:0.8,fill:{color:colors[0]}});
      sl.addText(s.title,{x:0.3,y:0.08,w:9.4,h:0.64,fontSize:18,fontFace:'Microsoft Yahei',color:colors[3],bold:true});
      // Bullets
      sl.addText(s.bullets.map(b=>'▸ '+b).join('\n'),{
        x:0.5,y:1.1,w:9,h:4.0,fontSize:14,fontFace:'Microsoft Yahei',color:colors[1],
        lineSpacingMultiple:1.8,valign:'top',paraSpaceAfter:6
      });
      // Page number
      sl.addText((i+1)+'/'+pptData.slides.length,{x:8.5,y:5.1,w:1.2,h:0.3,fontSize:9,color:'9ca3af',align:'right'});
    }
    ppt.writeFile({fileName:'AI百宝箱-'+pptData.topic.slice(0,20).replace(/[\/\\?%*:|"<>]/g,'')+'.pptx'}).then(()=>toast('📥 下载成功！'));
  }catch(e){toast('❌ 下载失败: '+e.message)}
}

function copyPPT(){
  if(!pptData||!pptData.slides.length){toast('请先生成PPT');return}
  const txt = pptData.slides.map((s,i)=>`--- 第${i+1}页 ---\n标题：${s.title}\n要点：\n`+s.bullets.map(b=>'  · '+b).join('\n')).join('\n\n');
  navigator.clipboard.writeText(txt).then(()=>toast('📋 已复制全部内容')).catch(()=>toast('复制失败'));
}

// ══════ NAVIGATION ══════
let d=null,cur='all';
async function load(){
  const g=document.getElementById('grid');
  g.innerHTML='<div class="empty" style="display:block">⏳ 加载中…</div>';
  try{
    const r=await fetch('tools.json?_='+Date.now());
    d=await r.json();
    const t=d.categories.reduce((s,c)=>s+(c.tools?c.tools.length:0),0);
    const h=d.categories.reduce((s,c)=>s+(c.tools?c.tools.filter(x=>x.hot).length:0),0);
    document.getElementById('c1').textContent=t;
    document.getElementById('c2').textContent=h;
    document.getElementById('c3').textContent=d.categories.length;
    document.getElementById('upd').textContent='📅 '+d.updated+' · '+t+' 个工具';
    pills();render();

    // Restore saved key
    const saved = localStorage.getItem('deepseek_key');
    if(saved) document.getElementById('pptKey').placeholder='已保存Key ('+saved.substring(0,10)+'...)';
  }catch(e){g.innerHTML='<div class="empty" style="display:block">✦ 加载失败，刷新试试</div>'}
}
function pills(){
  const t=d.categories.reduce((s,c)=>s+(c.tools?c.tools.length:0),0);
  document.getElementById('pills').innerHTML=`<div class="pill active" data-p="all" onclick="setP('all')">全部 <span class="c">${t}</span></div>`+
    d.categories.map(c=>`<div class="pill" data-p="${c.id}" onclick="setP('${c.id}')">${c.icon||'#'} ${c.name} <span class="c">${c.tools.length}</span></div>`).join('');
}
function setP(id){cur=id;document.querySelectorAll('.pill').forEach(p=>p.classList.toggle('active',p.dataset.p===id));f(document.getElementById('q').value)}
function f(v){render(v)}
function render(v,p){
  if(p===undefined)p=cur;
  const q=(v||'').toLowerCase().trim();
  const g=document.getElementById('grid');
  let h='',a=false;
  for(const c of d.categories){
    const t=(c.tools||[]).filter(x=>{if(q&&!x.name.toLowerCase().includes(q)&&!x.desc.toLowerCase().includes(q))return false;if(p!=='all'&&c.id!==p)return false;return true});
    if(!t.length)continue;
    a=true;
    h+=`<div class="ch"><span class="ci">${c.icon||'#'}</span><span class="cn">${c.name}</span><span class="cb"></span></div>`+
      t.map((x,i)=>`<a class="card" style="animation-delay:${i*0.03}s" href="${x.url}" target="_blank" rel="noopener">
        <div class="ct"><div class="ci">${x.icon||'🔧'}</div><div class="cnn">${x.name}</div></div>
        <div class="cdd">${x.desc||''}</div>${x.hot?'<div class="chott">✦ 热门</div>':''}
      </a>`).join('');
  }
  g.innerHTML=h;
  document.getElementById('empty').style.display=a?'none':'block';
  if(!a)g.innerHTML='';
}
window.addEventListener('scroll',()=>{document.getElementById('topBtn').style.display=window.scrollY>400?'flex':'none'});
function toast(m){
  const t=document.getElementById('toast');
  t.textContent=m;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2500);
}
load();
</script>
